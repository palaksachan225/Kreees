<!DOCTYPE html>
<html>
<head>
<title>Little Forever 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('foreverbg.jpg') no-repeat center center/cover;
}

/* OVERLAY */
.overlay {
  background: rgba(255,255,255,0.15);
  min-height: 100vh;
}

/* GRID (NO OVERLAP) */
.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
  padding: 20px;
  justify-items: center;
}

/* POLAROID */
.polaroid {
  width: 160px;
  padding: 10px 10px 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  position: relative;
  cursor: pointer;
  transition: 0.3s;
}

/* IMAGE */
.polaroid img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 8px;
  filter: blur(6px);
  transition: 0.3s;
}

/* REVEAL */
.polaroid.active img {
  filter: blur(0);
}

/* TAPE */
.tape {
  position: absolute;
  width: 40px;
  height: 15px;
  background: rgba(255,255,200,0.7);
  top: -8px;
  left: 50%;
  margin-left: -20px;
  transform: rotate(-10deg);
}

/* HOVER */
.polaroid:hover {
  transform: scale(1.05) rotate(0deg);
}

/* BUTTONS */
.back {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff4d6d;
  color: white;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  border: none;
  font-size: 18px;
}

.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #ff4d6d;
  color: white;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  border: none;
}
</style>

</head>

<body>

<div class="overlay">

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="board" id="board"></div>

<button class="back" onclick="goBack()">←</button>
<button class="music-btn" onclick="toggleMusic()">🎵</button>

</div>

<script>

/* BACK */
function goBack(){
  window.location.href = "index.html";
}

/* MUSIC */
function toggleMusic(){
  let m = document.getElementById("bgMusic");
  m.paused ? m.play() : m.pause();
}

/* AUTO PLAY */
document.body.addEventListener("click",()=>{
  document.getElementById("bgMusic").play();
},{once:true});

/* CREATE 25 POLAROIDS */
const board = document.getElementById("board");

for(let i=1;i<=25;i++){

  let p = document.createElement("div");
  p.className = "polaroid";

  /* slight random tilt */
  p.style.transform = "rotate(" + (Math.random()*10 - 5) + "deg)";

  let img = document.createElement("img");
  img.src = "photo" + i + ".jpg";

  let tape = document.createElement("div");
  tape.className = "tape";

  p.appendChild(tape);
  p.appendChild(img);

  /* TAP TO REVEAL */
  p.onclick = function(){
    p.classList.toggle("active");
  };

  board.appendChild(p);
}

</script>

</body>
</html>
