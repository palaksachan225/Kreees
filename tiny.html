<!DOCTYPE html>
<html>
<head>
<title>Tiny Tales 📖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('bookbg.jpg') no-repeat center center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.book {
  width: 320px;
  height: 420px;
  position: relative;
}

/* PAGE */
.page {
  width: 100%;
  height: 100%;
  position: absolute;
  background: white;
  border-radius: 10px;
  transition: transform 0.8s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  overflow: hidden;
}

/* STACK ORDER */
.page:nth-child(1){ z-index:7; }
.page:nth-child(2){ z-index:6; }
.page:nth-child(3){ z-index:5; }
.page:nth-child(4){ z-index:4; }
.page:nth-child(5){ z-index:3; }
.page:nth-child(6){ z-index:2; }
.page:nth-child(7){ z-index:1; }

/* COVER */
.cover {
  background: linear-gradient(#ff9ecb, #ff4d6d);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  font-family: cursive;
}

/* YOUTUBE FIX */
.page iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* FLIP */
.flipped {
  transform: translateX(-340px) rotate(-10deg);
}

/* BACK BUTTON */
.back {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff4d6d;
  color: white;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  border: none;
}
</style>

</head>

<body>

<audio id="flipSound">
  <source src="flip.mp3">
</audio>

<div class="book">

  <div class="page cover">Tiny Tales 💖</div>

  <div class="page">
    <iframe src="https://www.youtube.com/embed/8SvtiOMISgs"
      allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <div class="page">
    <iframe src="https://www.youtube.com/embed/HCXGzRF9kJQ"
      allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <div class="page">
    <iframe src="https://www.youtube.com/embed/HeT4hpiASZM"
      allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <div class="page">
    <iframe src="https://www.youtube.com/embed/VJbP92EoCRM"
      allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <div class="page">
    <iframe src="https://www.youtube.com/embed/dliGoRKQpeM"
      allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <div class="page">
    <iframe src="https://www.youtube.com/embed/crEB-hHfeUE"
      allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

</div>

<button class="back" onclick="goBack()">←</button>

<script>

let current = 0;
const pages = document.querySelectorAll(".page");

/* FLIP */
function flip(){
  if(current < pages.length){
    pages[current].classList.add("flipped");
    document.getElementById("flipSound").play();
    current++;
  }
}

/* CLICK */
document.body.addEventListener("click", flip);

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50){
    flip();
  }
});

/* BACK */
function goBack(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
